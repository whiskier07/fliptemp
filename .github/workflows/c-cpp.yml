name: CMake Build

# Trigger the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Run on a virtual Ubuntu Linux machine
    runs-on: ubuntu-latest

    steps:
    # 1. Download the repository code onto the runner
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configure the CMake build directory
    - name: Configure CMake
      run: cmake -S . -B build

    # 3. Compile the project in Release mode
    - name: Build Project
      run: cmake --build build --config Release
